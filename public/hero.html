<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nela &amp; Vojta · 20. 6. 2026</title>
  <meta name="description" content="Nela a Vojta se berou 20. června 2026 v Zádveřicích.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ── Reset ───────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Tokens ──────────────────────────────────────────────── */
    :root {
      --ivory:     #FDFCF7;
      --champagne: #F4EFE6;
      --text:      #1D1915;
      --mid:       #5A5248;
      --muted:     #928880;
      --gold:      #B8936A;
      --gold-soft: #D5BBAA;
      --line:      #E5DACE;
      --f-serif:   'Cormorant Garamond', Georgia, serif;
      --f-sans:    'Jost', system-ui, sans-serif;
    }

    /* ── Base ────────────────────────────────────────────────── */
    html { height: 100%; }

    body {
      font-family: var(--f-sans);
      font-weight: 300;
      color: var(--text);
      background: #fff;
      min-height: 100%;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ── Hero ────────────────────────────────────────────────── */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ivory);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 44%,
          rgba(184,147,106,.09) 0%,
          transparent 70%);
      opacity: 0; /* GSAP fades this in */
    }

    /* ── Corner ornaments ────────────────────────────────────── */
    .corners,
    .corners-b {
      position: absolute;
      inset: clamp(1.25rem, 4vw, 2.75rem);
      pointer-events: none;
    }

    .corners  { opacity: 0; }
    .corners-b { opacity: 0; }

    .corners::before,
    .corners::after,
    .corners-b::before,
    .corners-b::after {
      content: '';
      position: absolute;
      width: clamp(26px, 4.5vw, 46px);
      height: clamp(26px, 4.5vw, 46px);
      border-color: var(--line);
      border-style: solid;
    }

    .corners::before   { top: 0;    left: 0;  border-width: 1px 0 0 1px; }
    .corners::after    { top: 0;    right: 0; border-width: 1px 1px 0 0; }
    .corners-b::before { bottom: 0; left: 0;  border-width: 0 0 1px 1px; }
    .corners-b::after  { bottom: 0; right: 0; border-width: 0 1px 1px 0; }

    /* ── Content ─────────────────────────────────────────────── */
    .hero-inner {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 5rem 2rem;
      width: 100%;
      max-width: 820px;
    }

    /* ── Names — clip reveal ─────────────────────────────────── */
    .name-clip {
      overflow: hidden;
      padding-bottom: 0.06em; /* guard against descender clip */
    }

    .name {
      display: block;
      font-family: var(--f-serif);
      font-size: clamp(4.5rem, 17vw, 10.5rem);
      font-weight: 300;
      line-height: 0.88;
      letter-spacing: 0.05em;
      color: var(--text);
      transform: translateY(108%);
      will-change: transform;
    }

    /* ── & connector ─────────────────────────────────────────── */
    .connector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(1rem, 4vw, 2.25rem);
      margin: clamp(0.9rem, 2.5vw, 1.6rem) 0;
      opacity: 0;
    }

    .c-rule {
      flex: 1;
      max-width: 90px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-soft), transparent);
      transform: scaleX(0);
      transform-origin: center;
      will-change: transform;
    }

    .c-amp {
      font-family: var(--f-serif);
      font-size: clamp(1.05rem, 3.2vw, 1.65rem);
      font-style: italic;
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 0.12em;
      flex-shrink: 0;
    }

    /* ── Subtitle ────────────────────────────────────────────── */
    .subtitle {
      font-family: var(--f-serif);
      font-size: clamp(0.85rem, 2.4vw, 1.1rem);
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.28em;
      margin-top: clamp(1.75rem, 4.5vw, 2.75rem);
      opacity: 0;
      transform: translateY(10px);
    }

    /* ── Thin rule below subtitle ────────────────────────────── */
    .meta-rule {
      width: 1px;
      height: 28px;
      background: var(--gold-soft);
      margin: clamp(0.9rem, 2.5vw, 1.4rem) auto 0;
      opacity: 0;
      transform: scaleY(0);
      transform-origin: top;
    }

    /* ── Date + location ─────────────────────────────────────── */
    .event-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.85rem;
      margin-top: clamp(0.6rem, 1.5vw, 1rem);
      opacity: 0;
      transform: translateY(10px);
    }

    .event-meta time,
    .event-meta address {
      font-family: var(--f-sans);
      font-size: clamp(0.6rem, 1.7vw, 0.7rem);
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--mid);
      font-style: normal;
    }

    .meta-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
    }

    /* ── CTA ─────────────────────────────────────────────────── */
    .cta-wrap {
      margin-top: clamp(2.25rem, 5vw, 3.5rem);
      opacity: 0;
      transform: translateY(8px);
    }

    .cta {
      display: inline-block;
      padding: 0.875rem 2.75rem;
      border: 1px solid var(--gold-soft);
      color: var(--mid);
      font-family: var(--f-sans);
      font-size: 0.625rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      text-decoration: none;
      background: transparent;
      cursor: pointer;
      transition: border-color 0.4s ease, background 0.4s ease, color 0.4s ease;
    }

    .cta:hover {
      border-color: var(--gold);
      background: var(--gold);
      color: #fff;
    }

    .cta:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 4px;
    }

    /* ── Prefers-reduced-motion ──────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .hero,
      .name,
      .connector,
      .c-rule,
      .subtitle,
      .meta-rule,
      .event-meta,
      .cta-wrap,
      .corners,
      .corners-b {
        opacity: 1 !important;
        transform: none !important;
        transition: none !important;
      }
      .cta { transition: none !important; }
    }

    /* ── Mobile tweaks ───────────────────────────────────────── */
    @media (max-width: 380px) {
      .cta { padding: 0.8rem 1.75rem; }
      .c-rule { max-width: 50px; }
    }
  </style>
</head>

<body>
<main>
  <section class="hero" id="hero" aria-label="Svatební oznámení Nely a Vojty">

    <div class="corners"   aria-hidden="true"></div>
    <div class="corners-b" aria-hidden="true"></div>

    <div class="hero-inner">

      <!-- Accessible h1 — hidden visually, read by screen readers -->
      <h1 class="sr-only">Nela &amp; Vojta — Bereme se 20. 6. 2026 v Zádveřicích</h1>

      <!-- Name 1 -->
      <div class="name-clip" aria-hidden="true">
        <span class="name" id="name1">Nela</span>
      </div>

      <!-- & connector -->
      <div class="connector" aria-hidden="true">
        <span class="c-rule" id="rule-l"></span>
        <span class="c-amp">&amp;</span>
        <span class="c-rule" id="rule-r"></span>
      </div>

      <!-- Name 2 -->
      <div class="name-clip" aria-hidden="true">
        <span class="name" id="name2">Vojta</span>
      </div>

      <!-- Subtitle -->
      <p class="subtitle" id="subtitle">bereme se</p>

      <!-- Vertical rule -->
      <div class="meta-rule" id="meta-rule" aria-hidden="true"></div>

      <!-- Date + Location -->
      <div class="event-meta" id="meta">
        <time datetime="2026-06-20">20. 6. 2026</time>
        <span class="meta-dot" aria-hidden="true"></span>
        <address>Zádveřice</address>
      </div>

      <!-- CTA -->
      <div class="cta-wrap" id="cta-wrap">
        <a href="#program" class="cta">Zobrazit více</a>
      </div>

    </div>
  </section>
</main>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
(function () {
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduced) return; /* CSS media query handles static reveal */

  /* ── CSS-only fallback if GSAP fails to load ── */
  if (typeof gsap === 'undefined') {
    const hero = document.getElementById('hero');
    hero.style.transition = 'opacity 0.8s ease';
    requestAnimationFrame(function () { hero.style.opacity = '1'; });

    const revealAll = [
      '#name1', '#name2', '.connector', '.c-rule',
      '#subtitle', '#meta-rule', '#meta', '#cta-wrap',
      '.corners', '.corners-b'
    ];
    revealAll.forEach(function (sel, i) {
      document.querySelectorAll(sel).forEach(function (el) {
        el.style.cssText += [
          'transition: opacity 0.65s ease ' + (i * 0.1) + 's,',
          '            transform 0.65s ease ' + (i * 0.1) + 's;',
          'opacity: 1; transform: none;'
        ].join(' ');
      });
    });
    return;
  }

  /* ── GSAP timeline ── */
  var tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

  tl
    /* 0.00 s — background materialises */
    .to('#hero', {
      opacity: 1,
      duration: 0.55,
      ease: 'power2.inOut'
    })

    /* 0.12 s — corner ornaments settle in */
    .to(['.corners', '.corners-b'], {
      opacity: 1,
      duration: 0.55
    }, 0.12)

    /* 0.28 s — Nela rises from clip */
    .to('#name1', {
      y: '0%',
      duration: 0.7,
      ease: 'power4.out'
    }, 0.28)

    /* 0.46 s — connector fades, rules expand outward */
    .to('.connector', {
      opacity: 1,
      duration: 0.01
    }, 0.46)
    .to('.c-rule', {
      scaleX: 1,
      duration: 0.55,
      ease: 'expo.out',
      stagger: 0.06
    }, 0.46)

    /* 0.52 s — Vojta rises from clip */
    .to('#name2', {
      y: '0%',
      duration: 0.7,
      ease: 'power4.out'
    }, 0.52)

    /* 0.88 s — subtitle drifts up */
    .to('#subtitle', {
      opacity: 1,
      y: 0,
      duration: 0.55,
      ease: 'power2.out'
    }, 0.88)

    /* 1.02 s — vertical rule draws down */
    .to('#meta-rule', {
      opacity: 1,
      scaleY: 1,
      duration: 0.4,
      ease: 'power2.inOut'
    }, 1.02)

    /* 1.12 s — date + location */
    .to('#meta', {
      opacity: 1,
      y: 0,
      duration: 0.5,
      ease: 'power2.out'
    }, 1.12)

    /* 1.26 s — CTA */
    .to('#cta-wrap', {
      opacity: 1,
      y: 0,
      duration: 0.5,
      ease: 'power2.out'
    }, 1.26);
})();
</script>

</body>
</html>
